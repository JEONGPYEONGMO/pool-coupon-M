<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏊 내 수영장 쿠폰</title>
<link rel="manifest" href="/manifest-member.json">
<link rel="apple-touch-icon" href="/icons/member-192.png">
<meta name="theme-color" content="#059669">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="내쿠폰">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
  body { font-family:'Noto Sans KR',sans-serif; background:linear-gradient(180deg,#f0fdf4 0%,#f0f9ff 40%,#f8fafc 100%); min-height:100vh; }
  input::placeholder { color:#94a3b8; }
  .header { background:linear-gradient(135deg,#059669 0%,#10b981 50%,#34d399 100%); padding:28px 20px 20px; color:#fff; position:relative; overflow:hidden; }
  .header::before { content:''; position:absolute; top:-30px; right:-30px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.08); }
  .header::after { content:''; position:absolute; bottom:-20px; left:30px; width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,0.05); }
  .header-content { position:relative; z-index:1; }
  .header h1 { font-family:'Outfit',sans-serif; font-size:22px; font-weight:800; letter-spacing:-0.5px; display:inline; }
  .sync-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; margin-left:8px; vertical-align:middle; }
  .sync-on { background:rgba(255,255,255,0.2); color:#fff; }
  .sync-off { background:rgba(239,68,68,0.3); color:#fca5a5; }
  .sync-dot { width:6px; height:6px; border-radius:50%; }
  .sync-dot.on { background:#fff; animation:pulse 2s infinite; }
  .sync-dot.off { background:#ef4444; }
  .content { padding:16px 16px 100px; max-width:560px; margin:0 auto; }
  .member-list-item { padding:14px 16px; border-radius:12px; background:#fff; border:1.5px solid #e2e8f0; margin-bottom:8px; cursor:pointer; transition:all 0.15s; }
  .member-list-item:active { transform:scale(0.98); }
  .member-list-item:hover { border-color:#10b981; }
  .profile-card { padding:24px 20px; border-radius:18px; background:#fff; border:2px solid #a7f3d0; margin-bottom:16px; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.05); }
  .big-ring { width:100px; height:100px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-direction:column; margin:0 auto 12px; }
  .big-ring-num { font-family:'Outfit',sans-serif; font-size:36px; font-weight:800; line-height:1; }
  .big-ring-label { font-size:12px; font-weight:600; margin-top:2px; }
  .stats-row { display:flex; gap:10px; margin-bottom:16px; }
  .stat-box { flex:1; padding:14px; border-radius:12px; text-align:center; }
  .stat-num { font-family:'Outfit',sans-serif; font-size:22px; font-weight:800; }
  .stat-label { font-size:11px; font-weight:600; margin-top:2px; }
  .history-section { margin-top:16px; }
  .history-row { display:flex; align-items:flex-start; justify-content:space-between; padding:10px 14px; border-radius:8px; background:#fff; border:1px solid #f1f5f9; margin-bottom:4px; font-size:13px; gap:8px; }
  .history-type { display:inline-flex; align-items:center; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; flex-shrink:0; }
  .type-use { background:#fef2f2; color:#ef4444; }
  .type-buy { background:#ecfdf5; color:#059669; }
  .back-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px; border:1.5px solid #e2e8f0; background:#fff; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:600; color:#64748b; cursor:pointer; margin-bottom:16px; transition:all 0.15s; }
  .back-btn:active { transform:scale(0.97); }
  .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
  .badge-ok { background:#ecfdf5; color:#059669; }
  .badge-warn { background:#fef3c7; color:#d97706; }
  .badge-empty { background:#fef2f2; color:#ef4444; }
  .progress-bar { height:10px; border-radius:5px; background:#f1f5f9; overflow:hidden; margin:12px auto 0; max-width:200px; }
  .progress-fill { height:100%; border-radius:5px; transition:width 0.4s ease; }
  .empty-state { text-align:center; padding:60px 20px; color:#94a3b8; }
  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:1100; padding:12px 24px; border-radius:10px; font-size:14px; font-weight:600; box-shadow:0 8px 25px rgba(0,0,0,0.12); animation:slideDown 0.3s ease; }
  .toast-success { background:#ecfdf5; color:#059669; border:1px solid #a7f3d0; }
  .toast-error { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; }
  .month-nav { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:12px; }
  .month-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #e2e8f0; background:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .month-btn:active { transform:scale(0.9); }
  @keyframes slideDown { from{transform:translateX(-50%) translateY(-20px);opacity:0;} to{transform:translateX(-50%) translateY(0);opacity:1;} }
  @keyframes slideUp { from{transform:translateY(30px);opacity:0;} to{transform:translateY(0);opacity:1;} }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .hidden { display:none !important; }
</style>
</head>
<body>

<div id="toast" class="toast hidden"></div>

<div id="mainApp" class="hidden">
  <div class="header">
    <div class="header-content">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
        <span style="font-size:28px;">🏊</span>
        <h1>내 수영장 쿠폰</h1>
        <span id="syncBadge" class="sync-badge sync-off"><span class="sync-dot off"></span>연결 중...</span>
      </div>
    </div>
  </div>

  <div class="content">
    <div id="mainContent"></div>
  </div>
</div>

<script>
const SELECTED_KEY = "pool-selected-member";
let data = { members:[], history:[] };
let db = null;
let firebaseConnected = false;
let selectedMemberId = localStorage.getItem(SELECTED_KEY) || null;
let viewMonth = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0'); })();

const HARDCODED_CONFIG = {
  "apiKey": "AIzaSyBW_fArnqLwbvWqaEckqCJyEo26n-_IhlI",
  "authDomain": "pool-coupon.firebaseapp.com",
  "databaseURL": "https://pool-coupon-default-rtdb.asia-southeast1.firebasedatabase.app",
  "projectId": "pool-coupon",
  "storageBucket": "pool-coupon.firebasestorage.app",
  "messagingSenderId": "786663186799",
  "appId": "1:786663186799:web:0c07d50e06f925af64c89a"
};

function initFirebase(config) {
  try {
    firebase.initializeApp(config);
    db = firebase.database();
    db.ref('.info/connected').on('value',(snap)=>{
      firebaseConnected=snap.val()===true; updateSyncBadge();
    });
    db.ref('pool').on('value',(snap)=>{
      const val=snap.val();
      if(val){
        data.members=val.members?Object.values(val.members):[];
        data.history=val.history?Object.values(val.history):[];
        render();
      }
    });
    return true;
  } catch(e){ console.error(e); return false; }
}
function updateSyncBadge() {
  const badge=document.getElementById("syncBadge"); if(!badge)return;
  if(firebaseConnected){
    badge.className="sync-badge sync-on";
    badge.innerHTML='<span class="sync-dot on"></span>실시간 연결';
  } else {
    badge.className="sync-badge sync-off";
    badge.innerHTML='<span class="sync-dot off"></span>연결 끊김';
  }
}

let toastTimer;
function showToast(msg,type="success") {
  const el=document.getElementById("toast");
  el.textContent=msg; el.className="toast toast-"+type;
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.add("hidden"),2500);
}

function activeMembers() { return data.members.filter(m=>!m.deleted); }

function selectMember(id) { selectedMemberId=id; localStorage.setItem(SELECTED_KEY,id); render(); }
function goBack() { selectedMemberId=null; localStorage.removeItem(SELECTED_KEY); render(); }
function changeMonth(delta) {
  const [y,m]=viewMonth.split('-').map(Number);
  const d=new Date(y,m-1+delta,1);
  viewMonth=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0');
  render();
}

function getRingColor(m) {
  if(m.remaining===0) return {bg:"#fef2f2",border:"#ef4444",text:"#ef4444"};
  if(m.remaining<=2) return {bg:"#fffbeb",border:"#f59e0b",text:"#d97706"};
  return {bg:"#ecfdf5",border:"#059669",text:"#059669"};
}

function render() {
  const el=document.getElementById("mainContent"); if(!el)return;
  const members=activeMembers();
  const selected=selectedMemberId?members.find(m=>m.id===selectedMemberId):null;
  if(selected) renderDetail(el,selected);
  else renderList(el,members);
}

function renderList(el,members) {
  let html='<div style="margin-bottom:16px;">'
    +'<p style="font-size:15px;font-weight:700;color:#0f172a;margin-bottom:4px;">내 이름을 선택하세요</p>'
    +'<p style="font-size:12px;color:#94a3b8;">실시간으로 쿠폰 잔여와 이용 내역을 확인할 수 있습니다</p>'
    +'</div>';
  if(members.length===0){
    html+='<div class="empty-state"><div style="font-size:48px;margin-bottom:12px;">⏳</div><p style="font-size:15px;font-weight:600;">등록된 회원이 없습니다</p><p style="font-size:13px;margin-top:6px;">관리자에게 등록을 요청하세요</p></div>';
  } else {
    html+=members.map(m=>{
      const ring=getRingColor(m);
      const sb=m.remaining===0?'<span class="badge badge-empty">소진</span>':m.remaining<=2?'<span class="badge badge-warn">⚠️ '+m.remaining+'장</span>':'<span class="badge badge-ok">'+m.remaining+'장</span>';
      return '<div class="member-list-item" onclick="selectMember(\''+m.id+'\')"><div style="display:flex;align-items:center;justify-content:space-between;">'
        +'<div style="display:flex;align-items:center;gap:12px;">'
        +'<div style="width:42px;height:42px;border-radius:50%;background:'+ring.bg+';border:2.5px solid '+ring.border+';display:flex;align-items:center;justify-content:center;flex-shrink:0;">'
        +'<span style="font-family:\'Outfit\',sans-serif;font-size:16px;font-weight:800;color:'+ring.text+';">'+m.remaining+'</span></div>'
        +'<div><div style="font-weight:700;font-size:15px;color:#0f172a;">'+m.name+'</div>'
        +(m.affiliation?'<div style="font-size:11px;color:#94a3b8;">'+m.affiliation+'</div>':'')
        +'</div></div>'
        +'<div style="display:flex;align-items:center;gap:8px;">'+sb+'<span style="color:#cbd5e1;font-size:18px;">›</span></div>'
        +'</div></div>';
    }).join('');
  }
  el.innerHTML=html;
}

function renderDetail(el,m) {
  const ring=getRingColor(m);
  const pct=m.totalBought>0?(m.remaining/m.totalBought*100):0;
  const totalUsed=m.totalBought-m.remaining;
  const myHistory=data.history.filter(h=>h.memberId===m.id);
  const monthHistory=myHistory.filter(h=>h.date.startsWith(viewMonth)).sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||''));
  const monthUses=monthHistory.filter(h=>h.type==="use").length;

  let html='<button class="back-btn" onclick="goBack()">← 목록으로</button>'
    +'<div class="profile-card">'
    +'<div class="big-ring" style="background:'+ring.bg+';border:4px solid '+ring.border+';">'
    +'<div class="big-ring-num" style="color:'+ring.text+';">'+m.remaining+'</div>'
    +'<div class="big-ring-label" style="color:'+ring.text+';">잔여</div></div>'
    +'<div style="font-weight:800;font-size:20px;color:#0f172a;margin-bottom:4px;">'+m.name+'</div>'
    +(m.affiliation?'<div style="font-size:13px;color:#94a3b8;margin-bottom:8px;">'+m.affiliation+'</div>':'')
    +'<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:linear-gradient(90deg,'+ring.border+','+ring.border+'88);"></div></div>'
    +'<div style="font-size:12px;color:#94a3b8;margin-top:8px;">총 '+m.totalBought+'장 중 '+totalUsed+'장 사용</div>'
    +'</div>'
    +'<div class="stats-row">'
    +'<div class="stat-box" style="background:#ecfdf5;border:1px solid #a7f3d0;"><div class="stat-num" style="color:#059669;">'+m.remaining+'</div><div class="stat-label" style="color:#059669;">잔여 쿠폰</div></div>'
    +'<div class="stat-box" style="background:#fef2f2;border:1px solid #fecaca;"><div class="stat-num" style="color:#ef4444;">'+totalUsed+'</div><div class="stat-label" style="color:#ef4444;">총 사용</div></div>'
    +'<div class="stat-box" style="background:#eff6ff;border:1px solid #bfdbfe;"><div class="stat-num" style="color:#2563eb;">'+monthUses+'</div><div class="stat-label" style="color:#2563eb;">이번 달 사용</div></div>'
    +'</div>'
    +'<div class="history-section">'
    +'<div class="month-nav">'
    +'<button class="month-btn" onclick="changeMonth(-1)">‹</button>'
    +'<span style="font-weight:700;font-size:15px;color:#0f172a;min-width:100px;text-align:center;">'+viewMonth+'</span>'
    +'<button class="month-btn" onclick="changeMonth(1)">›</button>'
    +'</div>';

  if(monthHistory.length===0){
    html+='<div style="text-align:center;padding:30px;color:#94a3b8;font-size:13px;">이 달의 내역이 없습니다</div>';
  } else {
    html+=monthHistory.map(r=>{
      const isUse=r.type==="use";
      const amtStr=isUse?"-"+(r.amount||1)+"장":"+"+r.amount+"장";
      const remStr=(r.remaining!=null&&isUse)?'<span style="color:#64748b;">잔여'+r.remaining+'</span>':"";
      const companionInfo=(r.companions&&r.companions.length)?'<div style="font-size:11px;color:#6366f1;padding-top:2px;">+동반: '+r.companions.join(', ')+'</div>':"";
      return '<div class="history-row">'
        +'<div style="display:flex;flex-direction:column;gap:2px;">'
        +'<div style="display:flex;align-items:center;gap:10px;">'
        +'<span class="history-type '+(isUse?'type-use':'type-buy')+'">'+(isUse?'사용':'구매')+'</span>'
        +'<span style="color:#64748b;font-size:12px;">'+amtStr+'</span>'
        +'</div>'+companionInfo+'</div>'
        +'<div style="display:flex;align-items:center;gap:8px;color:#94a3b8;font-size:11px;flex-shrink:0;">'
        +'<span>'+r.date+'</span><span>'+r.time+'</span>'+remStr
        +'</div></div>';
    }).join('');
  }
  html+='</div>';
  el.innerHTML=html;
}

function init() {
  document.getElementById("mainApp").classList.remove("hidden");
  if(!initFirebase(HARDCODED_CONFIG)) showToast("연결 실패. 관리자에게 문의하세요.","error");
}
init();

// PWA
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;showInstallBanner();});
function showInstallBanner(){
  if(document.getElementById('installBanner'))return;
  const b=document.createElement('div');b.id='installBanner';
  b.style.cssText='position:fixed;bottom:16px;left:16px;right:16px;padding:14px 16px;border-radius:14px;background:linear-gradient(135deg,#059669,#10b981);color:#fff;display:flex;align-items:center;justify-content:space-between;z-index:900;box-shadow:0 8px 30px rgba(0,0,0,0.2);font-family:"Noto Sans KR",sans-serif;animation:slideUp .3s ease;max-width:540px;margin:0 auto;';
  b.innerHTML='<div><div style="font-weight:700;font-size:14px;">📲 앱으로 설치</div><div style="font-size:11px;opacity:0.85;margin-top:2px;">홈 화면에 추가하면 앱처럼 사용</div></div><div style="display:flex;gap:8px;"><button onclick="installApp()" style="padding:8px 16px;border-radius:8px;border:none;background:#fff;color:#059669;font-weight:700;font-size:13px;cursor:pointer;">설치</button><button onclick="this.parentElement.parentElement.remove()" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.3);background:transparent;color:#fff;font-size:13px;cursor:pointer;">닫기</button></div>';
  document.body.appendChild(b);
}
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;const b=document.getElementById('installBanner');if(b)b.remove();});}}
</script>
</body>
</html>
