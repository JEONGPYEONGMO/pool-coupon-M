<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏊 꼴뚜기 수중하키</title>
<meta name="theme-color" content="#059669">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="꼴뚜기UWH">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="badge-images.js"></script>
<style>
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
body { font-family:'Noto Sans KR',sans-serif; background:#f0fdf4; min-height:100vh; }

#loginScreen {
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:24px;
  background:linear-gradient(160deg,#059669 0%,#10b981 45%,#34d399 100%);
}
.login-card {
  width:100%; max-width:360px;
  background:rgba(255,255,255,0.13); backdrop-filter:blur(20px);
  border:1.5px solid rgba(255,255,255,0.28); border-radius:24px; padding:28px 20px;
}
.login-logo { text-align:center; margin-bottom:24px; }
.login-logo .icon { font-size:52px; display:block; margin-bottom:8px; }
.login-logo .title { font-family:'Outfit',sans-serif; font-size:22px; font-weight:900; color:#fff; }
.login-logo .sub { font-size:13px; color:rgba(255,255,255,0.75); margin-top:4px; }
.member-login-list { display:flex; flex-direction:column; gap:8px; max-height:58vh; overflow-y:auto; margin-bottom:12px; }
.member-login-btn {
  display:flex; align-items:center; gap:12px; padding:13px 15px;
  border-radius:14px; background:rgba(255,255,255,0.18);
  border:1.5px solid rgba(255,255,255,0.3); cursor:pointer;
  width:100%; text-align:left; font-family:'Noto Sans KR',sans-serif; transition:all 0.18s;
}
.member-login-btn:active { background:rgba(255,255,255,0.32); transform:scale(0.98); }
.login-avatar {
  width:44px; height:44px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:'Outfit',sans-serif; font-size:17px; font-weight:800; flex-shrink:0;
}
.login-section-label {
  color:rgba(255,255,255,0.9); font-size:11px; font-weight:800;
  margin:14px 4px 6px; padding-left:4px; letter-spacing:0.5px;
  text-transform:none;
}

.header {
  background:linear-gradient(135deg,#059669,#10b981);
  padding:20px 18px 16px; color:#fff; position:relative; overflow:hidden;
}
.header::before { content:''; position:absolute; top:-20px; right:-20px; width:100px; height:100px; border-radius:50%; background:rgba(255,255,255,0.07); }
.header-row { display:flex; align-items:center; justify-content:space-between; position:relative; }
.logout-btn {
  padding:6px 13px; border-radius:8px;
  border:1.5px solid rgba(255,255,255,0.4); background:transparent;
  color:#fff; font-size:12px; font-weight:700; cursor:pointer; font-family:'Noto Sans KR',sans-serif;
}
.top-tabs { display:flex; background:#fff; border-bottom:2px solid #e2e8f0; position:sticky; top:0; z-index:50; }
.top-tab-btn {
  flex:1; padding:13px 6px; border:none; border-bottom:3px solid transparent;
  background:transparent; color:#94a3b8; font-family:'Noto Sans KR',sans-serif;
  font-size:13px; font-weight:500; cursor:pointer; transition:all 0.18s;
}
.top-tab-btn.active { color:#059669; border-bottom-color:#059669; font-weight:700; }

.content { padding:16px 16px 80px; max-width:560px; margin:0 auto; }
.card { padding:16px; border-radius:16px; background:#fff; border:1.5px solid #e2e8f0; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }

.profile-card {
  padding:24px 16px; border-radius:18px; background:#fff;
  border:2px solid #a7f3d0; margin-bottom:12px;
  text-align:center; box-shadow:0 4px 16px rgba(0,0,0,0.05);
}
.big-ring { width:96px; height:96px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-direction:column; margin:0 auto 14px; }
.big-ring-num { font-family:'Outfit',sans-serif; font-size:34px; font-weight:900; line-height:1; }
.big-ring-label { font-size:12px; font-weight:600; margin-top:2px; }
.progress-bar { height:8px; border-radius:4px; background:#f1f5f9; overflow:hidden; margin-top:10px; }
.progress-fill { height:100%; border-radius:4px; transition:width 0.5s ease; }

.stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:12px; }
.stat-box { border-radius:12px; padding:12px 8px; text-align:center; }
.stat-num { font-family:'Outfit',sans-serif; font-size:26px; font-weight:800; line-height:1; }
.stat-label { font-size:11px; font-weight:600; margin-top:4px; }

.history-row { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid #f1f5f9; }
.history-row:last-child { border-bottom:none; }
.history-type { display:inline-flex; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:700; flex-shrink:0; margin-top:1px; }
.month-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.month-btn { width:34px; height:34px; border-radius:50%; border:1.5px solid #e2e8f0; background:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.month-btn:active { background:#f1f5f9; }

.badge-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:12px; }
.badge-item { border-radius:14px; padding:12px 8px; text-align:center; background:#fff; border:1.5px solid #e2e8f0; }
.badge-item.earned { border-color:#f59e0b; background:linear-gradient(135deg,#fffbeb,#fefce8); box-shadow:0 2px 8px rgba(245,158,11,0.15); }
.badge-item.not-earned { opacity:0.4; filter:grayscale(60%); }
.badge-img { width:56px; height:56px; border-radius:50%; object-fit:cover; margin:0 auto 7px; display:block; }
.badge-emoji { font-size:42px; display:block; margin-bottom:7px; line-height:1; }
.badge-name { font-size:11px; font-weight:700; color:#0f172a; line-height:1.3; }
.badge-date { font-size:10px; color:#d97706; margin-top:4px; font-weight:600; }
.badge-desc { font-size:10px; color:#94a3b8; margin-top:3px; }

.rank-row { display:flex; align-items:center; gap:10px; padding:12px; border-radius:12px; background:#fff; border:1.5px solid #e2e8f0; margin-bottom:8px; }
.rank-medal { font-size:24px; width:36px; text-align:center; flex-shrink:0; }
.rank-bar { height:8px; border-radius:4px; background:#f1f5f9; overflow:hidden; }
.rank-bar-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,#0891b2,#06b6d4); }

.notice-table { width:100%; border-collapse:collapse; font-size:12px; margin-bottom:12px; }
.notice-table th { background:#059669; color:#fff; padding:7px 8px; font-weight:700; }
.notice-table td { padding:7px 8px; border-bottom:1px solid #e2e8f0; }

.sync-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; }
.sync-on { background:rgba(255,255,255,0.22); color:#fff; }
.sync-off { background:rgba(239,68,68,0.3); color:#fca5a5; }
.sync-dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
.sync-dot.on { background:#fff; animation:pulse 2s infinite; }
.sync-dot.off { background:#ef4444; }
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:1100; padding:12px 24px; border-radius:10px; font-size:14px; font-weight:600; box-shadow:0 8px 25px rgba(0,0,0,0.12); white-space:nowrap; }
.toast-success { background:#ecfdf5; color:#059669; border:1px solid #a7f3d0; }
.toast-error   { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; }
.hidden { display:none !important; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation:fadeIn 0.28s ease both; }
</style>
</head>
<body>
<div id="toast" class="hidden"></div>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <span class="icon">🏊</span>
      <div class="title">꼴뚜기 수중하키</div>
      <div class="sub">이름을 선택해 로그인하세요</div>
    </div>
    <div class="member-login-list" id="loginList">
      <div style="text-align:center;color:rgba(255,255,255,0.7);padding:20px;">Firebase 연결 중...</div>
    </div>
    <div style="text-align:center;">
      <span id="syncBadgeLogin" class="sync-badge sync-off"><span class="sync-dot off"></span>연결 중</span>
    </div>
  </div>
</div>

<div id="mainApp" class="hidden">
  <div class="header">
    <div class="header-row">
      <div>
        <div style="font-family:'Outfit',sans-serif;font-size:19px;font-weight:800;" id="headerName">회원</div>
        <div style="font-size:12px;opacity:0.8;margin-top:3px;" id="headerSub"></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span id="syncBadge" class="sync-badge sync-off"><span class="sync-dot off"></span>오프라인</span>
        <button class="logout-btn" onclick="logout()">로그아웃</button>
      </div>
    </div>
  </div>

  <div class="top-tabs">
    <button class="top-tab-btn active" id="tabBtnInfo"   onclick="switchTab('info')">👤 내 정보</button>
    <button class="top-tab-btn"        id="tabBtnRanking" onclick="switchTab('ranking')">🏆 랭킹</button>
    <button class="top-tab-btn"        id="tabBtnNotice" onclick="switchTab('notice')">📢 공지사항</button>
  </div>

  <div class="content">
    <div id="tabInfo"   class="fade-in"></div>
    <div id="tabRanking" class="hidden"></div>
    <div id="tabNotice" class="hidden"></div>
  </div>
</div>

<script>
const FB_CONFIG = {
  apiKey:"AIzaSyBW_fArnqLwbvWqaEckqCJyEo26n-_IhlI",
  authDomain:"pool-coupon.firebaseapp.com",
  databaseURL:"https://pool-coupon-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"pool-coupon",
  storageBucket:"pool-coupon.firebasestorage.app",
  messagingSenderId:"786663186799",
  appId:"1:786663186799:web:0c07d50e06f925af64c89a"
};

let db=null, firebaseConnected=false, toastTimer;
let data = { members:[], history:[], settings:{}, badges:[], awarded:[] };
let selectedMemberId=null, currentTab='info';
let viewMonth=(()=>{ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; })();

firebase.initializeApp(FB_CONFIG);
db=firebase.database();

db.ref('.info/connected').on('value', snap=>{
  firebaseConnected=snap.val()===true; updateSyncUI();
});
db.ref('pool').on('value', snap=>{
  const val=snap.val()||{};
  data.members  = val.members  ? Object.values(val.members)  : [];
  data.history  = val.history  ? Object.values(val.history)  : [];
  data.settings = val.settings||{};
  data.badges   = val.badges   ? Object.values(val.badges)   : [];
  data.awarded  = val.awarded  ? Object.values(val.awarded)  : [];
  renderLoginList();
  if(selectedMemberId) renderCurrentTab();
});

function activeMembers(){ return data.members.filter(m=>!m.deleted); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast toast-${type}`;
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.add('hidden'),2500);
}
function getRingColor(m){
  if(m.remaining===0) return {bg:'#fef2f2',border:'#ef4444',text:'#ef4444'};
  if(m.remaining<=3)  return {bg:'#fffbeb',border:'#f59e0b',text:'#d97706'};
  return {bg:'#ecfdf5',border:'#059669',text:'#059669'};
}
function getBadgeImg(b){
  if(!b) return null;
  if(b.imageData) return b.imageData;
  return findBadgeImage(b.name);
}
function changeMonth(delta){
  const [y,mo]=viewMonth.split('-').map(Number);
  const d=new Date(y,mo-1+delta,1);
  viewMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  renderCurrentTab();
}
function updateSyncUI(){
  ['syncBadge','syncBadgeLogin'].forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    if(firebaseConnected){
      el.className='sync-badge sync-on';
      el.innerHTML='<span class="sync-dot on"></span>실시간 연결';
    } else {
      el.className='sync-badge sync-off';
      el.innerHTML='<span class="sync-dot off"></span>연결 끊김';
    }
  });
}

// ── LOGIN ──
function renderLoginList(){
  const el=document.getElementById('loginList'); if(!el) return;
  const members=activeMembers();

  // 히스토리에서 동반입장/현장입장 고유 인원 집계
  const compMap={}, guestMap={};
  data.history.forEach(h=>{
    if(!h.memberName) return;
    if(h.type==='companion'){
      if(!compMap[h.memberName]) compMap[h.memberName]={name:h.memberName,count:0};
      compMap[h.memberName].count++;
    } else if(h.type==='guest'){
      if(!guestMap[h.memberName]) guestMap[h.memberName]={name:h.memberName,count:0};
      guestMap[h.memberName].count++;
    }
  });
  const companionList=Object.values(compMap).sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  const guestList=Object.values(guestMap).sort((a,b)=>a.name.localeCompare(b.name,'ko'));

  if(!members.length && !companionList.length && !guestList.length){
    el.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.7);padding:24px;">등록된 회원이 없습니다</div>';
    return;
  }

  let html='';

  // 🎫 티켓회원
  if(members.length>0){
    html+=`<div class="login-section-label">🎫 티켓회원 (${members.length})</div>`;
    html+=members.map(m=>{
      const ring=getRingColor(m);
      const st=m.remaining===0?'소진':m.remaining<=3?`⚠️ ${m.remaining}장 남음`:`${m.remaining}장 남음`;
      const aw=data.awarded.filter(a=>a.memberId===m.id).length;
      return `<button class="member-login-btn" onclick="login('${m.id}')">
        <div class="login-avatar" style="background:${ring.bg};border:2.5px solid ${ring.border};color:${ring.text};">${m.remaining}</div>
        <div style="flex:1;">
          <div style="font-size:16px;font-weight:700;color:#fff;">${esc(m.name)}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.72);margin-top:2px;">${st}${aw>0?' · 🏅'+aw+'개':''}${m.affiliation?' · '+esc(m.affiliation):''}</div>
        </div>
        <span style="color:rgba(255,255,255,0.45);font-size:20px;margin-left:auto;">›</span>
      </button>`;
    }).join('');
  }

  // 💜 동반입장
  if(companionList.length>0){
    html+=`<div class="login-section-label">💜 동반입장 (${companionList.length})</div>`;
    html+=companionList.map(g=>{
      const key='companion:'+g.name;
      const aw=data.awarded.filter(a=>a.memberId==='guest:'+g.name).length;
      return `<button class="member-login-btn" data-key="${esc(key)}" onclick="login(this.dataset.key)">
        <div class="login-avatar" style="background:#fdf4ff;border:2.5px solid #e9d5ff;color:#9333ea;font-size:20px;">💜</div>
        <div style="flex:1;">
          <div style="font-size:16px;font-weight:700;color:#fff;">${esc(g.name)}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.72);margin-top:2px;">동반입장 ${g.count}회${aw>0?' · 🏅'+aw+'개':''}</div>
        </div>
        <span style="color:rgba(255,255,255,0.45);font-size:20px;margin-left:auto;">›</span>
      </button>`;
    }).join('');
  }

  // 🟠 현장입장
  if(guestList.length>0){
    html+=`<div class="login-section-label">🟠 현장입장 (${guestList.length})</div>`;
    html+=guestList.map(g=>{
      const key='guest:'+g.name;
      const aw=data.awarded.filter(a=>a.memberId==='guest:'+g.name).length;
      return `<button class="member-login-btn" data-key="${esc(key)}" onclick="login(this.dataset.key)">
        <div class="login-avatar" style="background:#fff7ed;border:2.5px solid #fed7aa;color:#ea580c;font-size:20px;">🟠</div>
        <div style="flex:1;">
          <div style="font-size:16px;font-weight:700;color:#fff;">${esc(g.name)}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.72);margin-top:2px;">현장입장 ${g.count}회${aw>0?' · 🏅'+aw+'개':''}</div>
        </div>
        <span style="color:rgba(255,255,255,0.45);font-size:20px;margin-left:auto;">›</span>
      </button>`;
    }).join('');
  }

  el.innerHTML=html;
}

function login(memberId){
  selectedMemberId=memberId;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').classList.remove('hidden');
  viewMonth=(()=>{ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; })();
  updateHeader(); switchTab('info');
}
function logout(){
  selectedMemberId=null;
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginScreen').style.display='flex';
}
function updateHeader(){
  // 가상 ID (동반입장/현장입장) 처리
  if(selectedMemberId && (selectedMemberId.indexOf('companion:')===0 || selectedMemberId.indexOf('guest:')===0)){
    const isGuest=selectedMemberId.indexOf('guest:')===0;
    const name=isGuest?selectedMemberId.substring(6):selectedMemberId.substring(10);
    const type=isGuest?'guest':'companion';
    const label=isGuest?'현장입장':'동반입장';
    const count=data.history.filter(h=>h.type===type && h.memberName===name).length;
    const aw=data.awarded.filter(a=>a.memberId==='guest:'+name).length;
    document.getElementById('headerName').textContent=name+'님';
    document.getElementById('headerSub').textContent=`${label} · 누적 ${count}회 · 배지 ${aw}개`;
    return;
  }
  const m=activeMembers().find(x=>x.id===selectedMemberId); if(!m) return;
  document.getElementById('headerName').textContent=m.name+'님';
  const aw=data.awarded.filter(a=>a.memberId===selectedMemberId).length;
  document.getElementById('headerSub').textContent=`잔여 ${m.remaining}장 · 배지 ${aw}개`;
}

// ── TAB ──
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabBtnInfo').classList.toggle('active',tab==='info');
  document.getElementById('tabBtnRanking').classList.toggle('active',tab==='ranking');
  document.getElementById('tabBtnNotice').classList.toggle('active',tab==='notice');
  document.getElementById('tabInfo').classList.toggle('hidden',tab!=='info');
  document.getElementById('tabRanking').classList.toggle('hidden',tab!=='ranking');
  document.getElementById('tabNotice').classList.toggle('hidden',tab!=='notice');
  renderCurrentTab();
}
function renderCurrentTab(){
  updateHeader();
  if(currentTab==='info')    renderInfo();
  if(currentTab==='ranking') renderRanking();
  if(currentTab==='notice')  renderNotice();
}

// ── INFO TAB ──
function renderInfo(){
  const el=document.getElementById('tabInfo'); if(!el) return;
  // 가상 ID (동반입장/현장입장) 은 별도 렌더러로 분기
  if(selectedMemberId && (selectedMemberId.indexOf('companion:')===0 || selectedMemberId.indexOf('guest:')===0)){
    renderGuestInfo(); return;
  }
  const m=activeMembers().find(x=>x.id===selectedMemberId); if(!m) return;

  const ring=getRingColor(m);
  const pct=m.totalBought>0?(m.remaining/m.totalBought*100):0;
  const totalUsed=m.totalBought-m.remaining;
  const myHistory=data.history.filter(h=>h.memberId===m.id);
  const monthHistory=myHistory.filter(h=>h.date&&h.date.startsWith(viewMonth))
    .sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||''));
  const monthUses=monthHistory.filter(h=>h.type==='use').length;

  const myAwarded=data.awarded.filter(a=>a.memberId===selectedMemberId);
  const earnedIds=new Set(myAwarded.map(a=>a.badgeId));
  const notEarned=data.badges.filter(b=>!earnedIds.has(b.id));

  let html=`
  <div class="profile-card">
    <div class="big-ring" style="background:${ring.bg};border:4px solid ${ring.border};">
      <div class="big-ring-num" style="color:${ring.text};">${m.remaining}</div>
      <div class="big-ring-label" style="color:${ring.text};">잔여</div>
    </div>
    <div style="font-weight:800;font-size:20px;color:#0f172a;margin-bottom:4px;">${esc(m.name)}</div>
    ${m.affiliation?`<div style="font-size:13px;color:#94a3b8;margin-bottom:8px;">${esc(m.affiliation)}</div>`:''}

        <div class="badge-name">${esc(a.badgeName)}</div>
        <div class="badge-date">🗓 ${a.awardedAt}</div>
      </div>`;
    });
    html+=`</div>`;
  } else {
    html+=`<div style="text-align:center;padding:18px 0;color:#94a3b8;font-size:13px;">아직 획득한 배지가 없습니다</div>`;
  }

  if(notEarned.length>0){
    html+=`<div style="font-size:12px;font-weight:700;color:#94a3b8;margin:10px 0 8px;">미획득 배지</div><div class="badge-grid">`;
    notEarned.forEach(b=>{
      const img=getBadgeImg(b);
      html+=`<div class="badge-item not-earned">

        <div class="badge-name">${esc(b.name)}</div>
        ${b.desc?`<div class="badge-desc">${esc(b.desc)}</div>`:''}
      </div>`;
    });
    html+=`</div>`;

  html+=`</div>

    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <span style="font-weight:700;font-size:15px;color:#0f172a;">${viewMonth.replace('-','년 ')}월</span>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>`;

  if(monthHistory.length===0){
    html+=`<div style="text-align:center;padding:28px;color:#94a3b8;font-size:13px;">📭 이번 달 내역이 없습니다</div>`;
  } else {
    html+=monthHistory.map(r=>{
      let ts='',tl='',amtStr='';
      if(r.type==='use')       {ts='background:#eff6ff;color:#2563eb;';tl='사용';amtStr=`-${r.amount||1}장`;}
      else if(r.type==='buy')  {ts='background:#ecfdf5;color:#059669;';tl='구매';amtStr=`+${r.amount}장`;}
      else if(r.type==='companion'){ts='background:#f5f3ff;color:#7c3aed;';tl='동반';amtStr='';}
      else if(r.type==='guest')    {ts='background:#fff7ed;color:#ea580c;';tl='현장';amtStr='';}
      const extra=r.companions&&r.companions.length
        ?`<div style="font-size:11px;color:#6366f1;padding-top:2px;">+동반: ${r.companions.join(', ')}</div>`
        :r.paidBy?`<div style="font-size:11px;color:#9333ea;padding-top:2px;">(${r.paidBy}님 동반)</div>`:'';
      return `<div class="history-row">
        <span class="history-type" style="${ts}">${tl}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:600;color:#0f172a;">${amtStr}</div>${extra}
        </div>
        <div style="text-align:right;color:#94a3b8;font-size:11px;flex-shrink:0;">
          <div>${r.date} ${r.time||''}</div>
          ${r.remaining!=null?`<div>잔여 ${r.remaining}장</div>`:''}
        </div>
      </div>`;
    }).join('');
  }
  html+=`</div>`;
  el.innerHTML=html;
}

// ── RANKING TAB ──
function buildRanking(){
  const counts={};
  data.history.forEach(h=>{
    if(h.type==="use"||h.type==="companion"||h.type==="guest"){
      const n=h.memberName; if(!n)return;
      if(!counts[n]) counts[n]={name:n,count:0};
      counts[n].count++;
    }
  });
  return Object.values(counts).sort((a,b)=>b.count-a.count);
}
function renderRanking(){
  const el=document.getElementById('tabRanking'); if(!el)return;
  const ranking=buildRanking();
  const maxCount=ranking[0]?ranking[0].count:1;
  const medals=["🥇","🥈","🥉"];
  let html='<div class="card" style="border-color:#0891b2;border-width:2px;">'
    +'<div style="font-weight:800;font-size:15px;color:#0f172a;margin-bottom:4px;">🏆 참여 랭킹</div>'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:14px;">쿠폰 사용 + 동반 참석 + 현장 입장 통합</div>';
  if(ranking.length===0){
    html+='<div style="text-align:center;padding:28px;color:#94a3b8;font-size:13px;">참여 기록이 없습니다</div>';
  } else {
    html+=ranking.map((r,i)=>{
      const medal=i<3?medals[i]:'<span style="font-size:14px;font-weight:700;color:#94a3b8;">'+(i+1)+'</span>';
      const top=i<3?'border-color:#fbbf24;background:#fffbeb;':'';
      return '<div class="rank-row" style="'+top+'">'
        +'<div class="rank-medal">'+medal+'</div>'
        +'<div style="flex:1;min-width:0;">'
        +'<div style="font-weight:700;font-size:14px;color:#0f172a;margin-bottom:4px;">'+esc(r.name)+'</div>'
        +'<div class="rank-bar"><div class="rank-bar-fill" style="width:'+Math.round(r.count/maxCount*100)+'%;"></div></div>'
        +'</div>'
        +'<div style="text-align:right;flex-shrink:0;">'
        +'<div style="font-family:\'Outfit\',sans-serif;font-size:22px;font-weight:800;color:#0891b2;">'+r.count+'</div>'
        +'<div style="font-size:11px;color:#64748b;">회 참여</div>'
        +'</div></div>';
    }).join('');
  }
  html+='</div>';
  el.innerHTML=html;
}

  html+=`<div class="card" style="background:linear-gradient(135deg,#f8fafc,#f0fdf4);border:1.5px dashed #cbd5e1;text-align:center;margin-top:4px;">
    <p style="font-size:13px;color:#64748b;line-height:1.9;">
      🏊 우리 클럽은 회비가 없습니다.<br>
      모든 활동은 참여자의 자발적인 자원봉사 및 기부로 유지되며<br>
      티켓 판매 수익은 <strong style="color:#0f172a;">대관료 및 공용비품 구매</strong>에 사용됩니다.
    </p>
    <div style="margin-top:14px;padding:10px 14px;border-radius:10px;background:#eff6ff;border:1px solid #bfdbfe;">
      <p style="font-size:12px;color:#1e40af;font-weight:700;">💰 입금 안내</p>
      <p style="font-size:14px;color:#1e3a5f;font-weight:800;margin-top:4px;">카카오뱅크 3333-31-7659013 (꼴뚜기)</p>
      <p style="font-size:11px;color:#64748b;margin-top:2px;">선입금 · 현금만 가능</p>

  el.innerHTML=html;
