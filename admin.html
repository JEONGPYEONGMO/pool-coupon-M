<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎫 수영장 쿠폰 관리 (관리자)</title>
<link rel="manifest" href="/manifest-admin.json">
<link rel="apple-touch-icon" href="/icons/admin-192.png">
<meta name="theme-color" content="#0e7490">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="쿠폰관리">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
  body { font-family:'Noto Sans KR',sans-serif; background:linear-gradient(180deg,#ecfeff 0%,#f0f9ff 40%,#f8fafc 100%); min-height:100vh; }
  input::placeholder { color:#94a3b8; }
  .header { background:linear-gradient(135deg,#0e7490 0%,#0891b2 50%,#06b6d4 100%); padding:28px 20px 20px; color:#fff; position:relative; overflow:hidden; }
  .header::before { content:''; position:absolute; top:-30px; right:-30px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.08); }
  .header::after { content:''; position:absolute; bottom:-20px; left:30px; width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,0.05); }
  .header-content { position:relative; z-index:1; }
  .header h1 { font-family:'Outfit',sans-serif; font-size:20px; font-weight:800; letter-spacing:-0.5px; display:inline; }
  .header-sub { font-size:13px; opacity:0.85; margin-top:4px; font-weight:400; }
  .sync-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; margin-left:8px; vertical-align:middle; }
  .sync-on { background:rgba(16,185,129,0.2); color:#6ee7b7; }
  .sync-off { background:rgba(239,68,68,0.2); color:#fca5a5; }
  .sync-dot { width:6px; height:6px; border-radius:50%; }
  .sync-dot.on { background:#34d399; animation:pulse 2s infinite; }
  .sync-dot.off { background:#ef4444; }
  .tabs { display:flex; background:#fff; border-bottom:1px solid #e2e8f0; position:sticky; top:0; z-index:10; overflow-x:auto; }
  .tab-btn { flex:1; padding:12px 4px; border:none; border-bottom:3px solid transparent; background:transparent; color:#94a3b8; font-family:'Noto Sans KR',sans-serif; font-size:11px; font-weight:500; cursor:pointer; transition:all 0.2s; white-space:nowrap; min-width:58px; }
  .tab-btn.active { color:#0891b2; border-bottom-color:#0891b2; font-weight:700; }
  .content { padding:16px 16px 100px; max-width:560px; margin:0 auto; }
  .card { padding:16px; border-radius:14px; background:#fff; border:1.5px solid #e2e8f0; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,0.03); }
  .member-card { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:16px; border-radius:14px; background:#fff; border:1.5px solid #e2e8f0; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,0.03); transition:all 0.2s; }
  .member-card.warn { border-color:#fbbf24; background:#fffbeb; }
  .member-card.empty { border-color:#fca5a5; background:#fef2f2; }
  .coupon-ring { width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-direction:column; flex-shrink:0; }
  .coupon-ring-num { font-family:'Outfit',sans-serif; font-size:20px; font-weight:800; line-height:1; }
  .coupon-ring-label { font-size:9px; font-weight:600; margin-top:1px; }
  .btn { padding:8px 16px; border-radius:8px; border:none; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.15s; }
  .btn:active { transform:scale(0.96); }
  .btn-use { background:linear-gradient(135deg,#0891b2,#0e7490); color:#fff; padding:10px 22px; font-size:14px; }
  .btn-use:disabled { background:#cbd5e1; cursor:default; transform:none; }
  .btn-primary { background:linear-gradient(135deg,#0891b2,#0e7490); color:#fff; padding:10px 20px; font-size:14px; }
  .btn-outline { padding:8px 14px; border-radius:8px; border:1.5px solid #0891b2; background:#fff; color:#0891b2; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:600; cursor:pointer; }
  .btn-sm { padding:6px 12px; font-size:12px; }
  .btn-danger-outline { border:1px solid #fecaca; background:#fff; color:#ef4444; }
  .btn-buy-sm { background:linear-gradient(135deg,#059669,#10b981); color:#fff; padding:6px 12px; font-size:12px; border:none; border-radius:6px; font-family:'Noto Sans KR',sans-serif; font-weight:700; cursor:pointer; transition:all 0.15s; }
  .btn-buy-sm:active { transform:scale(0.95); }
  .btn-orange { background:linear-gradient(135deg,#ea580c,#f97316); color:#fff; padding:10px 18px; font-size:13px; border:none; border-radius:8px; font-family:'Noto Sans KR',sans-serif; font-weight:700; cursor:pointer; }
  .btn-orange:active { transform:scale(0.96); }
  .input { padding:10px 12px; border-radius:8px; border:1.5px solid #e2e8f0; font-family:'Noto Sans KR',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; }
  .input:focus { border-color:#0891b2; }
  .select { padding:8px 10px; border-radius:8px; border:1.5px solid #e2e8f0; font-family:'Noto Sans KR',sans-serif; font-size:13px; outline:none; background:#fff; cursor:pointer; }
  .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; gap:4px; }
  .badge-ok { background:#ecfdf5; color:#059669; }
  .badge-warn { background:#fef3c7; color:#d97706; }
  .badge-empty { background:#fef2f2; color:#ef4444; }
  .empty-state { text-align:center; padding:60px 20px; color:#94a3b8; }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:999; backdrop-filter:blur(4px); }
  .modal { background:#fff; border-radius:18px; padding:28px 24px; width:min(90vw,400px); box-shadow:0 25px 60px rgba(0,0,0,0.25); text-align:center; }
  .modal-icon { font-size:56px; margin-bottom:12px; }
  .modal-title { font-size:18px; font-weight:800; color:#0f172a; margin-bottom:6px; }
  .modal-desc { font-size:14px; color:#64748b; margin-bottom:20px; line-height:1.6; }
  .modal-btn { padding:12px 32px; border-radius:10px; border:none; font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.15s; }
  .modal-btn:active { transform:scale(0.97); }
  .use-modal { background:#fff; border-radius:18px; padding:24px 20px; width:min(92vw,420px); box-shadow:0 25px 60px rgba(0,0,0,0.25); }
  .use-modal-title { font-size:17px; font-weight:800; color:#0f172a; margin-bottom:16px; }
  .companion-tag { display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border-radius:20px; background:#eff6ff; border:1px solid #bfdbfe; font-size:13px; font-weight:600; color:#1d4ed8; margin:3px; }
  .companion-tag button { background:none; border:none; cursor:pointer; font-size:14px; color:#64748b; padding:0; line-height:1; }
  .stamp-flash { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:1000; background:rgba(0,0,0,0.25); backdrop-filter:blur(2px); pointer-events:none; }
  .stamp-circle { width:160px; height:160px; border-radius:50%; border:5px solid #0891b2; display:flex; align-items:center; justify-content:center; flex-direction:column; background:rgba(255,255,255,0.95); transform:scale(2.5) rotate(-10deg); opacity:0; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .stamp-circle.land { transform:scale(1) rotate(0deg); opacity:1; box-shadow:0 0 0 3px rgba(8,145,178,0.2), inset 0 0 15px rgba(8,145,178,0.1); }
  .stamp-circle.fade { opacity:0; transition:opacity 0.4s ease; }
  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:1100; padding:12px 24px; border-radius:10px; font-size:14px; font-weight:600; box-shadow:0 8px 25px rgba(0,0,0,0.12); animation:slideDown 0.3s ease; }
  .toast-success { background:#ecfdf5; color:#059669; border:1px solid #a7f3d0; }
  .toast-error { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; }
  .history-row { display:flex; align-items:flex-start; justify-content:space-between; padding:10px 14px; border-radius:8px; background:#fff; border:1px solid #f1f5f9; margin-bottom:4px; font-size:13px; gap:8px; }
  .history-type { display:inline-flex; align-items:center; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; flex-shrink:0; }
  .type-use { background:#fef2f2; color:#ef4444; }
  .type-buy { background:#ecfdf5; color:#059669; }
  .type-guest { background:#fdf4ff; color:#9333ea; }
  .sort-chip { padding:6px 12px; border-radius:20px; border:1.5px solid #e2e8f0; background:#fff; font-family:'Noto Sans KR',sans-serif; font-size:12px; font-weight:600; color:#64748b; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
  .sort-chip.active { background:#0891b2; color:#fff; border-color:#0891b2; }
  .progress-bar { height:8px; border-radius:4px; background:#f1f5f9; overflow:hidden; margin-top:8px; }
  .progress-fill { height:100%; border-radius:4px; transition:width 0.4s ease; }
  .rank-row { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; background:#fff; border:1.5px solid #e2e8f0; margin-bottom:8px; }
  .rank-medal { font-size:22px; width:32px; text-align:center; flex-shrink:0; }
  .rank-bar { height:8px; border-radius:4px; background:#f1f5f9; overflow:hidden; flex:1; }
  .rank-bar-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,#0891b2,#06b6d4); }
  .pw-screen { display:flex; flex-direction:column; align-items:center; padding:60px 20px; gap:16px; }
  .pw-dots { display:flex; gap:12px; margin:8px 0 4px; }
  .pw-dot { width:16px; height:16px; border-radius:50%; border:2px solid #cbd5e1; transition:all 0.2s; }
  .pw-dot.filled { background:#0891b2; border-color:#0891b2; }
  .pw-dot.wrong { background:#ef4444; border-color:#ef4444; animation:shake 0.3s; }
  .pw-numpad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:260px; width:100%; }
  .pw-key { padding:16px; border-radius:12px; border:1.5px solid #e2e8f0; background:#fff; font-family:'Outfit',sans-serif; font-size:22px; font-weight:600; color:#0f172a; cursor:pointer; transition:all 0.1s; text-align:center; user-select:none; }
  .pw-key:active { background:#f0f9ff; transform:scale(0.95); }
  .pw-key.empty { border:none; background:transparent; cursor:default; }
  @keyframes slideDown { from{transform:translateX(-50%) translateY(-20px);opacity:0;} to{transform:translateX(-50%) translateY(0);opacity:1;} }
  @keyframes slideUp { from{transform:translateY(30px);opacity:0;} to{transform:translateY(0);opacity:1;} }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .hidden { display:none !important; }
</style>
</head>
<body>

<div id="toast" class="toast hidden"></div>
<div id="alertModal" class="overlay hidden"></div>
<div id="useModal" class="overlay hidden"></div>

<!-- 공지 수정 모달 -->
<div id="editNtcModal" class="overlay hidden">
  <div class="use-modal" style="width:min(92vw,460px);">
    <div class="use-modal-title">✏️ 공지사항 수정</div>
    <input type="hidden" id="editNtcId">
    <div style="margin-bottom:10px;">
      <label style="font-size:12px;color:#64748b;font-weight:600;display:block;margin-bottom:4px;">제목</label>
      <input id="editNtcTitle" class="input" style="width:100%;" placeholder="공지 제목">
    </div>
    <div style="margin-bottom:14px;">
      <label style="font-size:12px;color:#64748b;font-weight:600;display:block;margin-bottom:4px;">내용</label>
      <textarea id="editNtcBody" style="width:100%;min-height:120px;padding:10px;border-radius:8px;border:1.5px solid #e2e8f0;font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;resize:vertical;line-height:1.6;" placeholder="내용 입력..."></textarea>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn" style="flex:1;background:#f1f5f9;color:#64748b;" onclick="closeEditNotice()">취소</button>
      <button class="btn btn-primary" style="flex:2;" onclick="saveEditNotice()">저장</button>
    </div>
  </div>
</div>
<div id="stampFlash" class="stamp-flash hidden"><div id="stampCircle" class="stamp-circle">
  <span style="font-size:12px;font-weight:800;color:#0891b2;letter-spacing:2px;">사용완료</span>
  <span style="font-size:24px;line-height:1.2;">🎫</span>
  <span style="font-size:10px;color:#0891b2;font-weight:600;">COUPON</span>
</div></div>

<div id="mainApp" class="hidden">
  <div class="header">
    <div class="header-content">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
        <span style="font-size:28px;">🎫</span>
        <h1>수영장 쿠폰 관리</h1>
        <span id="syncBadge" class="sync-badge sync-off"><span class="sync-dot off"></span>오프라인</span>
      </div>
      <p class="header-sub" id="headerSub"></p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="coupon" onclick="switchTab('coupon')">쿠폰사용</button>
    <button class="tab-btn" data-tab="guest" onclick="switchTab('guest')">현장입장🟠</button>
    <button class="tab-btn" data-tab="ranking" onclick="switchTab('ranking')">랭킹🏆</button>
    <button class="tab-btn" data-tab="history" onclick="switchTab('history')">이용내역</button>
    <button class="tab-btn" data-tab="badges" onclick="switchTab('badges')">배지🏅</button>
    <button class="tab-btn" data-tab="notices" onclick="switchTab('notices')">공지📢</button>
    <button class="tab-btn" data-tab="members" onclick="switchTab('members')">회원관리</button>
  </div>

  <div class="content">
    <div id="tab-coupon"></div>
    <div id="tab-guest" class="hidden"></div>
    <div id="tab-ranking" class="hidden"></div>
    <div id="tab-history" class="hidden"></div>
    <div id="tab-badges" class="hidden"></div>
    <div id="tab-notices" class="hidden"></div>
    <div id="tab-members" class="hidden"></div>
  </div>
</div>

<script>
const HARDCODED_CONFIG = {
  "apiKey": "AIzaSyBW_fArnqLwbvWqaEckqCJyEo26n-_IhlI",
  "authDomain": "pool-coupon.firebaseapp.com",
  "databaseURL": "https://pool-coupon-default-rtdb.asia-southeast1.firebasedatabase.app",
  "projectId": "pool-coupon",
  "storageBucket": "pool-coupon.firebasestorage.app",
  "messagingSenderId": "786663186799",
  "appId": "1:786663186799:web:0c07d50e06f925af64c89a"
};

let data = { members:[], history:[], settings:{}, badges:[], awarded:[] };
let db = null;
let firebaseConnected = false;
let currentTab = "coupon";
let filterMonth = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0'); })();
let historySortBy = "date-desc";
let adminUnlocked = false;
let pwInput = "";
let ADMIN_PW = "2602";

let pendingUseId = null;
let companions = [];
let companionInput = "";

// ===== FIREBASE =====
function initFirebase(config) {
  try {
    firebase.initializeApp(config);
    db = firebase.database();
    db.ref('.info/connected').on('value', (snap) => {
      firebaseConnected = snap.val() === true;
      updateSyncBadge();
    });
    db.ref('pool').on('value', (snap) => {
      const val = snap.val();
      if(val) {
        data.members = val.members ? Object.values(val.members) : [];
        data.history = val.history ? Object.values(val.history) : [];
        data.settings = val.settings || {};
        if(data.settings.adminPw) ADMIN_PW = data.settings.adminPw;
        data.badges = val.badges ? Object.values(val.badges) : [];
        data.awarded = val.awarded ? Object.values(val.awarded) : [];
      }
      render();
    });
    return true;
  } catch(e) { console.error(e); return false; }
}
function syncToFirebase() {
  if(!db) return;
  const mo = {}; data.members.forEach(m => mo[m.id]=m);
  const ho = {}; data.history.forEach(h => ho[h.id]=h);
  const bo = {}; (data.badges||[]).forEach(b=>bo[b.id]=b);
  const aw = {}; (data.awarded||[]).forEach(a=>aw[a.id]=a);
  db.ref('pool').set({ members:mo, history:ho, settings:data.settings||{}, badges:bo, awarded:aw });
}
function updateSyncBadge() {
  const badge = document.getElementById("syncBadge");
  if(!badge) return;
  if(firebaseConnected) {
    badge.className="sync-badge sync-on";
    badge.innerHTML='<span class="sync-dot on"></span>실시간 연동';
  } else {
    badge.className="sync-badge sync-off";
    badge.innerHTML='<span class="sync-dot off"></span>오프라인';
  }
}

// ===== INIT =====
function init() {
  document.getElementById("mainApp").classList.remove("hidden");
  if(!initFirebase(HARDCODED_CONFIG)) showToast("Firebase 연결 실패.","error");
}

// ===== UTILS =====
function today() { return new Date().toISOString().split("T")[0]; }
function nowTime() { return new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function activeMembers() { return data.members.filter(m=>!m.deleted); }

let toastTimer;
function showToast(msg,type="success") {
  const el=document.getElementById("toast");
  if(!el) return;
  el.textContent=msg; el.className="toast toast-"+type;
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.add("hidden"),2500);
}
function showAlert(icon,title,desc,btnText,btnColor,onClose) {
  const el=document.getElementById("alertModal"); el.className="overlay";
  el.innerHTML='<div class="modal"><div class="modal-icon">'+icon+'</div><div class="modal-title">'+title+'</div><div class="modal-desc">'+desc+'</div><button class="modal-btn" style="background:'+btnColor+';color:#fff;" onclick="closeAlert()">'+btnText+'</button></div>';
  el._onClose=onClose;
}
function closeAlert() { const el=document.getElementById("alertModal"); el.classList.add("hidden"); if(el._onClose)el._onClose(); }
function showStamp(cb) {
  const ov=document.getElementById("stampFlash"), c=document.getElementById("stampCircle");
  ov.classList.remove("hidden"); c.className="stamp-circle";
  setTimeout(()=>c.classList.add("land"),50);
  setTimeout(()=>c.classList.add("fade"),500);
  setTimeout(()=>{ov.classList.add("hidden");c.className="stamp-circle";if(cb)cb();},900);
}

function switchTab(tab) {
  if(tab==="members"&&!adminUnlocked) pwInput="";
  currentTab=tab;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  ["coupon","guest","ranking","history","badges","notices","members"].forEach(t=>document.getElementById("tab-"+t).classList.toggle("hidden",t!==tab));
  render();
}

// ===== USE MODAL =====
function openUseModal(memberId) {
  const m=data.members.find(x=>x.id===memberId);
  if(!m||m.remaining<=0){showToast("잔여 쿠폰이 없습니다","error");return;}
  pendingUseId=memberId; companions=[]; companionInput="";
  renderUseModal(m);
  document.getElementById("useModal").className="overlay";
}
function closeUseModal() {
  document.getElementById("useModal").classList.add("hidden");
  pendingUseId=null; companions=[];
}
function renderUseModal(m) {
  if(!m) m=data.members.find(x=>x.id===pendingUseId);
  if(!m) return;
  const el=document.getElementById("useModal");
  const tagsHtml=companions.map((c,i)=>'<span class="companion-tag">'+c.name+'<button onclick="removeCompanion('+i+')">✕</button></span>').join('');
  const needMore=m.remaining<companions.length+1;
  el.innerHTML='<div class="use-modal">'
    +'<div class="use-modal-title">🎫 쿠폰 사용 — '+m.name+'님</div>'
    +'<div style="background:#f0f9ff;border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px;color:#0369a1;">'
    +'잔여: <strong style="font-size:16px;">'+m.remaining+'장</strong>'
    +(companions.length>0?' <span style="margin-left:8px;">→ 차감: <strong>'+(companions.length+1)+'장</strong> (본인+동반 '+companions.length+'명)</span>':'')
    +'</div>'
    +'<div style="margin-bottom:14px;">'
    +'<div style="font-size:13px;font-weight:700;color:#334155;margin-bottom:6px;">동반인원 (선택)</div>'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:8px;">이름 입력 후 추가 — 1명당 쿠폰 1장 추가 차감</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:8px;">'

function confirmUse() {

  if(m.remaining<total){showToast("쿠폰이 부족합니다","error");return;}
  m.remaining-=total;
  const ts=new Date().toISOString();
  const companionNames=companions.map(c=>c.name);
  data.history.push({id:uid(),memberId:m.id,memberName:m.name,type:"use",amount:total,remaining:m.remaining,date:today(),time:nowTime(),timestamp:ts,companions:companionNames});
  companionNames.forEach(name=>{
    data.history.push({id:uid(),memberId:"guest_"+name,memberName:name,type:"companion",amount:0,date:today(),time:nowTime(),timestamp:ts,paidBy:m.name});
  });
  syncToFirebase();
  closeUseModal();
  showStamp(()=>{

      showAlert("🚨","쿠폰 소진!","<strong>"+m.name+"</strong>님의 쿠폰이<br>모두 소진되었습니다.<br>추가 구매가 필요합니다.","확인","#ef4444",()=>render());

      m.alertedLow=true; syncToFirebase();

// ===== EXPORT CSV =====
function exportCSV() {
  const recs=sortedHistory();
  const rows=[["날짜","시간","이름","구분","수량","잔여","동반/비고"]];
  recs.forEach(r=>{
    const tl=r.type==="buy"?"구매":r.type==="use"?"사용":r.type==="guest"?"현장입장":"동반참석";
    const ex=r.companions&&r.companions.length?r.companions.join("/"):r.paidBy?r.paidBy+"님 동반":r.note||"";
    rows.push([r.date,r.time,r.memberName,tl,r.amount||0,r.remaining!=null?r.remaining:"-",ex]);
  });
  const csv="\uFEFF"+rows.map(r=>r.join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="수영장쿠폰내역_"+filterMonth+".csv"; a.click();
  showToast(filterMonth+" CSV 저장 완료");
}

// ===== SORT =====
function setSort(key) { historySortBy=key; render(); }
function sortedHistory() {
  const recs=data.history.filter(r=>r.date.startsWith(filterMonth));
  const [field,dir]=historySortBy.split("-"); const mul=dir==="asc"?1:-1;
  return [...recs].sort((a,b)=>{
    if(field==="date") return mul*(a.timestamp||'').localeCompare(b.timestamp||'');
    if(field==="name") return mul*(a.memberName||'').localeCompare(b.memberName||'');
    return 0;
  });
}

// ===== RANKING =====
function buildRanking() {
  const counts={};
  data.history.forEach(h=>{
    if(h.type==="use"||h.type==="companion"||h.type==="guest") {
      const n=h.memberName; if(!n)return;
      if(!counts[n]) counts[n]={name:n,count:0};
      counts[n].count++;
    }
  });
  return Object.values(counts).sort((a,b)=>b.count-a.count);
}

function deleteHistoryRecord(id) {
  const r=data.history.find(h=>h.id===id); if(!r)return;
  if(!confirm("이 기록을 삭제하시겠습니까?\n["+r.memberName+" / "+r.date+" / "+(r.type==="buy"?"구매":r.type==="use"?"사용":r.type==="guest"?"현장입장":"동반참석")+"]")) return;
  // 사용 기록 삭제 시 쿠폰 복구
  if(r.type==="use") {
    const m=data.members.find(x=>x.id===r.memberId);
    if(m){ m.remaining+=r.amount||1; }
  }
  // 구매 기록 삭제 시 쿠폰 차감
  if(r.type==="buy") {
    const m=data.members.find(x=>x.id===r.memberId);
    if(m){ m.remaining=Math.max(0,m.remaining-r.amount); m.totalBought=Math.max(0,m.totalBought-r.amount); }
  }
  data.history=data.history.filter(h=>h.id!==id);
  syncToFirebase();
  showToast("기록이 삭제되었습니다");
  render();
}

function resetMonthHistory() {
  if(!confirm(filterMonth+" 월의 이용 내역을 전체 삭제하시겠습니까?\n⚠️ 사용 기록 삭제 시 쿠폰 잔여량이 복구됩니다.")) return;
  const monthRecs=data.history.filter(r=>r.date.startsWith(filterMonth));
  // 사용 기록 → 쿠폰 복구, 구매 기록 → 쿠폰 차감
  monthRecs.forEach(r=>{
    if(r.type==="use"){
      const m=data.members.find(x=>x.id===r.memberId);
      if(m) m.remaining+=r.amount||1;
    }
    if(r.type==="buy"){
      const m=data.members.find(x=>x.id===r.memberId);
      if(m){ m.remaining=Math.max(0,m.remaining-r.amount); m.totalBought=Math.max(0,m.totalBought-r.amount); }
    }
  });
  data.history=data.history.filter(r=>!r.date.startsWith(filterMonth));
  syncToFirebase();
  showToast(filterMonth+" 월 내역 전체 삭제 완료");
  render();
}

  const el=document.getElementById("tab-history"); if(!el)return;
  const recs=sortedHistory();
  const allMR=data.history.filter(r=>r.date.startsWith(filterMonth));
  const sortOpts=[{key:"date-desc",label:"최신순"},{key:"date-asc",label:"오래된순"},{key:"name-asc",label:"이름 ↑"},{key:"name-desc",label:"이름 ↓"}];
  let html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap;">'
    +'<input type="month" value="'+filterMonth+'" onchange="filterMonth=this.value;render();" class="input" style="flex:1 1 140px;">'
    +'<div style="display:flex;gap:6px;">'
    +'<button class="btn-outline" onclick="exportCSV()">📥 CSV</button>'
    +'<button onclick="resetMonthHistory()" style="padding:8px 12px;border-radius:8px;border:1px solid #fecaca;background:#fff;color:#ef4444;font-size:12px;font-weight:700;cursor:pointer;font-family:\'Noto Sans KR\',sans-serif;">🗑️ 월초기화</button>'
    +'</div></div>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">'
    +sortOpts.map(o=>'<button class="sort-chip '+(historySortBy===o.key?'active':'')+'" onclick="setSort(\''+o.key+'\')">'+o.label+'</button>').join('')
    +'</div>';
  if(recs.length===0){
    html+='<div class="empty-state" style="padding:40px"><div style="font-size:40px;margin-bottom:8px;">📭</div><p style="font-size:14px;">해당 월 내역이 없습니다</p></div>';
  } else {
    html+=recs.map(r=>{
      let tl, tc;
      if(r.type==="buy"){tl="구매";tc="type-buy";}
      else if(r.type==="use"){tl="사용";tc="type-use";}
      else if(r.type==="guest"){tl="현장입장";tc="";}
      else if(r.type==="companion"){tl="동반참석";tc="type-guest";}
      else{tl=r.type;tc="";}
      const ts=r.type==="guest"?'background:#fff7ed;color:#ea580c;':r.type==="companion"?'background:#fdf4ff;color:#9333ea;':'';
      const amtStr=r.type==="buy"?"+"+r.amount+"장":r.type==="use"?"-"+r.amount+"장":"";
      const remStr=(r.remaining!=null&&r.type==="use")?'<span style="color:#64748b;">잔여'+r.remaining+'</span>':"";
      const extra=r.companions&&r.companions.length?'<div style="font-size:11px;color:#6366f1;padding-top:2px;">+동반: '+r.companions.join(', ')+'</div>':r.paidBy?'<div style="font-size:11px;color:#9333ea;padding-top:2px;">('+r.paidBy+'님 동반)</div>':"";
      return '<div class="history-row" style="align-items:center;">'
        +'<div style="display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;">'
        +'<div style="display:flex;align-items:center;gap:8px;">'
        +'<span class="history-type '+tc+'" style="'+ts+'">'+tl+'</span>'
        +'<span style="font-weight:600;color:#0f172a;">'+r.memberName+'</span>'
        +'<span style="color:#64748b;font-size:12px;">'+amtStr+'</span>'
        +'</div>'+extra+'</div>'
        +'<div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">'
        +'<div style="text-align:right;color:#94a3b8;font-size:11px;">'
        +'<div>'+r.date+' '+r.time+'</div>'+remStr+'</div>'
        +'<button onclick="deleteHistoryRecord(\''+r.id+'\')" style="padding:4px 8px;border-radius:6px;border:1px solid #fecaca;background:#fff;color:#ef4444;font-size:11px;cursor:pointer;flex-shrink:0;">삭제</button>'
        +'</div></div>';
    }).join('');
    const uses=allMR.filter(r=>r.type==="use").reduce((s,r)=>s+(r.amount||0),0);
    const buys=allMR.filter(r=>r.type==="buy").reduce((s,r)=>s+r.amount,0);
    const guests=allMR.filter(r=>r.type==="guest"||r.type==="companion").length;
    html+='<div style="padding:14px;border-radius:12px;font-size:13px;margin-top:14px;background:#f0fdfa;border:1px solid #ccfbf1;color:#0f766e;"><strong>'+filterMonth+'</strong> 쿠폰 사용: <strong>'+uses+'장</strong> · 구매: <strong>'+buys+'장</strong> · 현장/동반: <strong>'+guests+'명</strong></div>';
  }
  el.innerHTML=html;
}

// ===== BADGE FUNCTIONS =====
function getBadgeImg(b) {
  if(b.presetKey && BADGE_PRESET_IMAGES[b.presetKey]) return BADGE_PRESET_IMAGES[b.presetKey];
  if(b.imageData) return b.imageData;
  return null;
}

function addBadgeDef() {
  const name = document.getElementById('bdgName').value.trim();
  const desc = document.getElementById('bdgDesc').value.trim();
  const preset = document.getElementById('bdgPreset').value;
  const fileEl = document.getElementById('bdgFile');
  if(!name){showToast('배지 이름을 입력해주세요','error');return;}
  const id = 'bdg_'+uid();
  const doSave = (imageData) => {
    const b = {id, name, desc, createdAt:new Date().toISOString()};
    if(preset) b.presetKey = preset;
    else if(imageData) b.imageData = imageData;
    data.badges.push(b);
    syncToFirebase();
    document.getElementById('bdgName').value='';
    document.getElementById('bdgDesc').value='';
    document.getElementById('bdgPreset').value='';
    fileEl.value='';
    showToast('배지가 추가되었습니다 🏅');
    render();
  };
  if(fileEl.files && fileEl.files[0]) {
    const reader = new FileReader();
    reader.onload = e => doSave(e.target.result);
    reader.readAsDataURL(fileEl.files[0]);
  } else {
    doSave(null);
  }
}

function deleteBadgeDef(id) {
  if(!confirm('이 배지를 삭제하시겠습니까?\n(부여된 기록도 삭제됩니다)')) return;
  data.badges = data.badges.filter(b=>b.id!==id);
  data.awarded = data.awarded.filter(a=>a.badgeId!==id);
  syncToFirebase(); showToast('배지 삭제됨'); render();
}

function openAwardModal(badgeId) {
  const b = data.badges.find(x=>x.id===badgeId); if(!b) return;
  const members = activeMembers();
  const imgTag = getBadgeImg(b) ? `<img src="${getBadgeImg(b)}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:12px;">` : `<div style="font-size:56px;margin-bottom:12px;">🏅</div>`;
  const opts = members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
  const el = document.getElementById('useModal'); el.className='overlay';
  el.innerHTML = `<div class="use-modal">
    <div style="text-align:center;">${imgTag}</div>
    <div class="use-modal-title">🏅 배지 부여 — ${b.name}</div>
    <div style="margin-bottom:12px;">
      <label style="font-size:12px;color:#64748b;font-weight:600;display:block;margin-bottom:4px;">회원 선택</label>
      <select id="awardMember" class="select" style="width:100%;">${opts}</select>
    </div>
    <div style="margin-bottom:16px;">
      <label style="font-size:12px;color:#64748b;font-weight:600;display:block;margin-bottom:4px;">달성 일자</label>
      <input type="date" id="awardDate" class="input" style="width:100%;" value="${today()}">
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn" style="flex:1;background:#f1f5f9;color:#64748b;" onclick="closeUseModal()">취소</button>
      <button class="btn btn-primary" style="flex:2;" onclick="confirmAward('${badgeId}')">부여</button>
    </div>
  </div>`;
}

function confirmAward(badgeId) {
  const memberId = document.getElementById('awardMember').value;
  const awardedAt = document.getElementById('awardDate').value;
  const m = data.members.find(x=>x.id===memberId); if(!m) return;
  const b = data.badges.find(x=>x.id===badgeId); if(!b) return;
  // 중복 체크
  if(data.awarded.some(a=>a.badgeId===badgeId&&a.memberId===memberId)) {
    showToast('이미 부여된 배지입니다','error'); return;
  }
  data.awarded.push({id:'aw_'+uid(), memberId, memberName:m.name, badgeId, badgeName:b.name, awardedAt});
  syncToFirebase(); closeUseModal(); showToast(`${m.name}님에게 '${b.name}' 배지 부여! 🏅`); render();
}

function revokeAward(awardId) {

// ===== NOTICES =====
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getNotices(){ return (data.settings&&data.settings.notices&&data.settings.notices.length>0)?data.settings.notices:[]; }

function saveNotices(notices){
  if(!data.settings) data.settings={};
  data.settings.notices=notices;
  syncToFirebase();
  showToast('공지사항이 저장되었습니다 📢');
  render();
}

function addNotice(){
  const title=document.getElementById('ntcTitle').value.trim();
  const body=document.getElementById('ntcBody').value.trim();
  if(!title||!body){showToast('제목과 내용을 모두 입력해주세요','error');return;}
  const notices=getNotices();
  notices.unshift({id:'ntc_'+Date.now(),type:'text',title,body,createdAt:new Date().toISOString()});
  document.getElementById('ntcTitle').value='';
  document.getElementById('ntcBody').value='';
  saveNotices(notices);
}

function deleteNotice(id){
  if(!confirm('이 공지를 삭제하시겠습니까?')) return;
  saveNotices(getNotices().filter(n=>n.id!==id));
}

function openEditNotice(id){
  const n=getNotices().find(x=>x.id===id); if(!n) return;
  document.getElementById('editNtcId').value=id;
  document.getElementById('editNtcTitle').value=n.title||'';
  document.getElementById('editNtcBody').value=n.type==='table'?(n.lines||[]).join('\n'):(n.body||'');
  document.getElementById('editNtcModal').classList.remove('hidden');
}
function closeEditNotice(){ document.getElementById('editNtcModal').classList.add('hidden'); }
function saveEditNotice(){
  const id=document.getElementById('editNtcId').value;
  const title=document.getElementById('editNtcTitle').value.trim();
  const body=document.getElementById('editNtcBody').value.trim();
  if(!title){showToast('제목을 입력해주세요','error');return;}
  const notices=getNotices();
  const idx=notices.findIndex(n=>n.id===id); if(idx<0) return;
  if(notices[idx].type==='table'){
    notices[idx].title=title;
    notices[idx].lines=body.split('\n').map(l=>l.trim()).filter(Boolean);
  } else {
    notices[idx].title=title;
    notices[idx].body=body;
  }
  closeEditNotice();
  saveNotices(notices);
}
function moveNotice(id,dir){
  const notices=getNotices();
  const idx=notices.findIndex(n=>n.id===id);
  const ni=idx+dir;
  if(ni<0||ni>=notices.length) return;
  [notices[idx],notices[ni]]=[notices[ni],notices[idx]];
  saveNotices(notices);
}

function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;const b=document.getElementById('installBanner');if(b)b.remove();});}}
</script>
